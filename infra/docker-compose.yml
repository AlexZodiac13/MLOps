
x-airflow-common: &airflow-common
  image: mlops-custom-airflow:latest
  environment: &airflow-environment
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/1
    AIRFLOW__CORE__FERNET_KEY: 46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__SECRET_KEY: 'secret_key_secret_key_secret_key_secret_key_secret_key_secret_key'
    AIRFLOW__WEBSERVER__BASE_URL: 'http://owgrant.home/airflow'
    AIRFLOW_UID: ${AIRFLOW_UID:-50000}
    # MLflow connectivity
    MLFLOW_TRACKING_URI: http://mlflow:5000
    MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
    MLFLOW_S3_BUCKET: ${MLFLOW_S3_BUCKET}
    # Hugging Face token (set locally, do NOT commit the real token)
    HF_TOKEN: ${HF_TOKEN}
    # Git for cloning training code
    GIT_REPO_URL: ${GIT_REPO_URL}
    GIT_BRANCH: ${GIT_BRANCH}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    # Mount local ML code for development, overriding the cloned repo if needed
    - ../ml:/opt/airflow/ml_code
    - airflow-ml-data:/opt/airflow/ml
  depends_on:
    - postgres
    - redis
    - mlflow

services:
  postgres:
    image: postgres:14
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init_db.sh:/docker-entrypoint-initdb.d/01-create-mlflow.sh:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 10
    restart: always

  airflow-base:
    build:
      context: ./airflow
      dockerfile: Dockerfile.ml
    image: mlops-custom-airflow:latest


  db-backup:
    build:
      context: ./docker-scripts
      dockerfile: Dockerfile.backup
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
      - MLFLOW_S3_ENDPOINT_URL=${MLFLOW_S3_ENDPOINT_URL}
      - MLFLOW_S3_BUCKET=${MLFLOW_S3_BUCKET}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - BACKUP_INTERVAL_SECONDS=3600
      - FORCE_RESTORE=true
    depends_on:
      postgres:
        condition: service_healthy
    command: ["restore_and_loop"]
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/healthy"]
      interval: 5s
      retries: 5

  redis:
    image: redis:latest
    # ports:
    #   - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50

  mlflow:
    image: mlops-custom-airflow:latest
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "mlflow server
      --backend-store-uri postgresql://airflow:airflow@postgres:5432/mlflow_db
      --default-artifact-root s3://${MLFLOW_S3_BUCKET}/ml-artifacts
      --host 0.0.0.0
      --port 5000
      --workers 4
      --serve-artifacts
      --allowed-hosts '*'
      "
    # ports:
    #   - "5001:5000"
    environment:
      # Disable CSRF protection by overriding the Gunicorn application setting if possible
      # But mostly we rely on --allowed-hosts '*' which we passed in command.
      
      # Ensure Gunicorn accepts requests from any proxy/host
      # --forwarded-allow-ips='*' is critical behind Nginx
      - GUNICORN_CMD_ARGS=--bind=0.0.0.0:5000 --forwarded-allow-ips='*'
      
      - MLFLOW_S3_ENDPOINT_URL=${MLFLOW_S3_ENDPOINT_URL}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}

    depends_on:
      - postgres
      - airflow-base
    restart: always

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    # ports:
    #   - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 30s
      retries: 5
    restart: always
    depends_on:
      airflow-base:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      airflow-base:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    command: celery worker --celery-hostname=celery@%h
    hostname: airflow-worker
    # GPU Configuration (uncomment if needed and ensure proper NVIDIA Container Toolkit setup)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: always
    depends_on:
      airflow-base:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    command: version
    depends_on:
      airflow-base:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mlflow:
        condition: service_started
      db-backup:
        condition: service_healthy
    environment:
      <<: *airflow-environment
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - airflow-webserver
      - mlflow
      - db-backup
    restart: always

  loki:
    image: grafana/loki:latest
    # ports:
    #   - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: always

  promtail:
    image: grafana/promtail:latest
    volumes:
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: always

  grafana:
    image: grafana/grafana:latest
    # ports:
    #   - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - loki
      - prometheus
    restart: always

  prometheus:
    image: prom/prometheus:latest
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: always
    depends_on:
      - node-exporter

  node-exporter:
    image: prom/node-exporter:latest
    command: 
      - '--path.rootfs=/host'
    volumes:
      - '/:/host:ro'
    restart: always

volumes:
  postgres-data:
  airflow-ml-data:
  prometheus-data:
