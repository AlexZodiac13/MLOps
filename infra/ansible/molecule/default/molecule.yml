---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: instance
    image: debian:12
    command: /sbin/init
    privileged: true
    pre_build_image: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
provisioner:
  name: ansible
  playbooks:
    converge: ../../playbook.yml
verifier:
  name: ansible
