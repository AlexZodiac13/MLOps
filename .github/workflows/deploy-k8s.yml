name: Build and Deploy to K8s

on:
  workflow_dispatch:

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  # Image names
  IMAGE_BOT_NAME: ${{ secrets.DOCKER_USERNAME }}/reminder-bot
  IMAGE_MODEL_NAME: ${{ secrets.DOCKER_USERNAME }}/reminder-model
  CLUSTER_ID: ${{ secrets.K8S_CLUSTER_ID }} # We need this or we can retrieve it
  
jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: [self-hosted, MLOps-runner] 
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Extract metadata for bot
        id: meta-bot
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BOT_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.run_number }}

      - name: Build and push bot image
        uses: docker/build-push-action@v5
        with:
          context: ./deploy/bot
          push: true
          tags: ${{ steps.meta-bot.outputs.tags }}
          labels: ${{ steps.meta-bot.outputs.labels }}

      - name: Extract metadata for model
        id: meta-model
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_MODEL_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.run_number }}

      - name: Build and push model image
        uses: docker/build-push-action@v5
        with:
          context: ./deploy/ml-model
          push: true
          tags: ${{ steps.meta-model.outputs.tags }}
          labels: ${{ steps.meta-model.outputs.labels }}
          build-args: |
             MLFLOW_TRACKING_URI=https://mlflow.zodiac.netcraze.pro/mlflow/
             MLFLOW_EXPERIMENT_NAME=reminder-bot-experiment
             MLFLOW_MODEL_STAGE=Production
             S3_ENDPOINT_URL=https://home.owgrant.su:9005
             S3_BUCKET_NAME=otus
             S3_ACCESS_KEY=${{ secrets.MINIO_ACCESS_KEY }}
             S3_SECRET_KEY=${{ secrets.MINIO_SECRET_KEY }}
             S3_REGION=us-east-1
             MODEL_PATH=/app/model/

  deploy-k8s:
    name: Deploy to Kubernetes
    needs: build-and-push
    runs-on: [self-hosted, MLOps-runner]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install YC CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Configure YC CLI
        run: |
          yc config set token ${{ secrets.YC_TOKEN }}
          yc config set folder-id ${{ secrets.FOLDER_ID }}
          yc config set cloud-id ${{ secrets.CLOUD_ID }}

      - name: Get K8s Credentials
        run: |
          # Получаем ID кластера если не задан явно, можно взять первый из списка или по имени
          CLUSTER_ID=$(yc managed-kubernetes cluster list --format json | jq -r '.[0].id')
          if [ -z "$CLUSTER_ID" ]; then
             echo "Cluster not found"
             exit 1
          fi
          yc managed-kubernetes cluster get-credentials --id $CLUSTER_ID --external --force

      - name: Prepare Secrets
        run: |
          # Создаем файл .env из секрета
          echo "${{ secrets.BOTENV_B64 }}" | base64 --decode > .env
          
          # Удаляем старый секрет и создаем новый
          kubectl delete secret reminder-secrets --ignore-not-found
          kubectl create secret generic reminder-secrets --from-env-file=.env

      - name: Update Image Names in Manifests
        run: |
          # Заменяем плейсхолдер <DOCKER_USERNAME> на реальное значение 
          # (или можно использовать sed)
          sed -i "s|<DOCKER_USERNAME>|${{ env.DOCKER_USERNAME }}|g" k8s/bot.yaml
          sed -i "s|<DOCKER_USERNAME>|${{ env.DOCKER_USERNAME }}|g" k8s/model.yaml

      - name: Apply Manifests
        run: |
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/model.yaml
          kubectl apply -f k8s/bot.yaml
          
          # Force restart deployments to pick up new images if using 'latest' tag
          kubectl rollout restart deployment/model
          kubectl rollout restart deployment/bot
