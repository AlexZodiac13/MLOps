name: Infrastructure Tests

on:
  workflow_dispatch:
  push:
    paths:
      - 'infra/terraform/**'
      - 'infra/ansible/**'
      - 'deploy/docker-compose.yaml'
      - 'infra/docker-compose.yml'
  pull_request:
    paths:
      - 'infra/terraform/**'
      - 'infra/ansible/**'
      - 'deploy/docker-compose.yaml'
      - 'infra/docker-compose.yml'

jobs:
  docker-compose-lint:
    name: Docker Compose Syntax Check
    runs-on: [self-hosted, MLOps-runner]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Mock .env files
        run: |
          # Создаем болванки файлов .env, чтобы docker-compose config не падал из-за отсутствующих переменных
          cp deploy/.env.example deploy/.env || touch deploy/.env
          cp infra/.env.example infra/.env || touch infra/.env

      - name: Validate Deploy Docker Compose
        working-directory: deploy
        run: docker compose -f docker-compose.yaml config -q

      - name: Validate Infra Docker Compose
        working-directory: infra
        run: docker compose -f docker-compose.yml config -q

  terratest:
    name: Terraform Tests (Terratest)
    runs-on: [self-hosted, MLOps-runner]
    env:
      TF_ROOT: infra/terraform
      TF_VAR_yc_token: ${{ secrets.YC_TOKEN }}
      TF_VAR_cloud_id: ${{ secrets.CLOUD_ID }}
      TF_VAR_folder_id: ${{ secrets.FOLDER_ID }}
      TF_VAR_zone: ${{ secrets.ZONE }}
      TF_VAR_public_key: ${{ secrets.PUBLIC_KEY }}
      TF_VAR_private_key: ${{ secrets.PRIVATE_KEY }}
      TF_VAR_minio_access_key: ${{ secrets.MINIO_ACCESS_KEY }}
      TF_VAR_minio_secret_key: ${{ secrets.MINIO_SECRET_KEY }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: infra/terraform/tests/go.sum

      - name: Run Terratest (Plan only)
        working-directory: infra/terraform/tests
        run: |
          # Создаем backend.conf для Terratest (так же как в apply.yml)
          cat <<EOF > ../backend.conf
          access_key                  = "${{ secrets.MINIO_ACCESS_KEY }}"
          secret_key                  = "${{ secrets.MINIO_SECRET_KEY }}"
          skip_credentials_validation = true
          skip_metadata_api_check     = true
          skip_region_validation      = true
          skip_requesting_account_id  = true
          skip_s3_checksum            = true
          EOF
          export TF_CLI_ARGS_init="-backend-config=backend.conf"
          
          go mod download
          go test -v -timeout 30m

  molecule:
    name: Ansible Tests (Molecule)
    runs-on: [self-hosted, MLOps-runner]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Ansible & Molecule
        run: |
          python -m pip install --upgrade pip
          pip install ansible molecule molecule-plugins[docker] docker

      - name: Run Molecule
        working-directory: infra/ansible
        run: molecule test
